<!DOCTYPE html>
<html lang="it">

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  :root{
    --sea: #0f6e56;
    --sea-light: #e1f5ee;
    --sea-dark: #085041;
    --sand: #ba7517;
    --sand-light: #faeeda;
    --ink: #24261f;
    --ink-soft: #5f5e5a;
    --line: #e3e0d6;
    --bg: #faf9f5;
    --card: #ffffff;
    --danger: #a32d2d;
    --danger-light: #fcebeb;
    --radius: 10px;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height:1.5;
  }
  h1,h2,h3{ font-family: Georgia, "Times New Roman", serif; font-weight:600; margin:0; }
  a{ color:inherit; }
  button, input, select{
    font-family: inherit;
    font-size: 14px;
  }
  button{
    cursor:pointer;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--ink);
    transition: background .15s ease;
  }
  button:hover{ background: #f2f1eb; }
  button.primary{
    background: var(--sea);
    color: #fff;
    border-color: var(--sea);
    font-weight:600;
  }
  button.primary:hover{ background: var(--sea-dark); }
  button.danger{ color: var(--danger); border-color: var(--danger); background: transparent; }
  button.danger:hover{ background: var(--danger-light); }
  button.chip{
    padding: 8px 10px;
    font-size: 12px;
    text-align:center;
  }
  button.chip.on{
    background: var(--sea-light);
    color: var(--sea-dark);
    border-color: var(--sea);
  }
  input[type=text], input[type=number], input[type=date], select, textarea{
    width:100%;
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
    color: var(--ink);
  }
  label.field-label{
    display:block;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }
  .field{ margin-bottom: 14px; }
  .container{
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }
  header.topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    background: var(--card);
    position: sticky; top:0; z-index:5;
  }
  header.topbar .brand{
    font-family: Georgia, serif;
    font-size: 20px;
    font-weight:700;
    color: var(--sea-dark);
    letter-spacing: 0.3px;
  }
  header.topbar .brand span{ color: var(--sand); }
  header.topbar nav button{ font-size:13px; }
  .card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px;
  }
  .stack{ display:flex; flex-direction:column; gap:10px; }
  .row{ display:flex; gap:10px; }
  .row > *{ flex:1; }
  .badge{
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    display:inline-flex; align-items:center; gap:4px;
    font-weight:600;

    background: var(--sea-light);

  .section-title{
    font-size: 13px;
    font-weight:700;
    text-transform: uppercase;

  .mini-calendar{

    text-decoration: underline;

  .toast{
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size:13px;

  .toast.neutral{ background:#f1efe8; color: var(--ink-soft); }
  .stars{ display:flex; gap:4px; }

    display:flex; align-items:center; gap:12px;
    padding: 12px 14px;
    border: 1px solid var(--line);

  .account-row .meta{ flex:1; }

    border: 1px dashed var(--ink-soft);

    padding: 14px;
    text-align:center;

    color: var(--ink-soft);

    display:flex; justify-content:space-between; align-items:center;
    background: var(--sand-light);
    border-radius: 8px;
    padding: 8px 12px;
    margin: 10px 0;
    font-size:13px;
  }
  .req-summary .val{ font-weight:700; color: var(--sand); }
</style>

<body>

<div id="app"></div>

<script>
/* ============================================================
   A Postu — prototipo funzionante
   Stack: HTML/JS vanilla + localStorage (pronto per essere
   sostituito con Firebase Realtime Database, stesso schema dati)
   ============================================================ */

const ZONE = ["Scicli centro","Scicli","Donnalucata","Sampieri","Cava d'Aliga","Playa Grande","Marina di Ragusa","Modica","Marina di Modica","Pozzallo"];
const ESTERNI = ["Giardino","Terrazza","Piscina","Cortile"];
const ESPERIENZA = ["1-3 anni","4-7 anni","8-10 anni","+ di 10 anni"];
const TIPI_STRUTTURA = ["Casa vacanze","B&B","Villa","Hotel","Affittacamere"];
const FISCALE = ["Partita IVA","Prestazione occasionale","Dipendente cooperativa","Contratto a chiamata","Altro"];
const TARIFFE = { ordinaria: 9, straordinaria: 10, apertura: 12 };
const TARIFFE_LABEL = { ordinaria: "Pulizia ordinaria", straordinaria: "Pulizia straordinaria", apertura: "Pulizia di apertura casa" };
const FASCE = ["mattina","pomeriggio"];
const MESI = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
const GIORNI_SETTIMANA = ["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];

function buildMiniCalendarHTML(){
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();
  const todayDate = today.getDate();

  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  let startWeekday = firstDay.getDay(); // 0=Dom,1=Lun,...6=Sab
  startWeekday = (startWeekday === 0) ? 6 : startWeekday - 1; // riallineo a settimana Lun-Dom

  let cells = "";
  for(let i=0; i<startWeekday; i++){
    cells += `<div class="mini-cal-day empty">-</div>`;
  }
  for(let d=1; d<=daysInMonth; d++){
    const isToday = d === todayDate;
    cells += `<div class="mini-cal-day${isToday ? " today" : ""}">${d}</div>`;
  }

  return `
    <div class="mini-calendar">
      <div class="mini-cal-header">${MESI[month]} ${year}</div>
      <div class="mini-cal-grid">
        ${GIORNI_SETTIMANA.map(g => `<div class="mini-cal-weekday">${g}</div>`).join("")}
        ${cells}
      </div>
    </div>
  `;
}

const GIORNI_LUNGHI = ["lunedì","martedì","mercoledì","giovedì","venerdì","sabato","domenica"];

function formatDataItaliana(iso){
  if(!iso) return null;
  const d = new Date(iso + "T00:00:00");
  if(isNaN(d.getTime())) return null;
  let wd = d.getDay(); // 0=Dom,1=Lun,...6=Sab
  wd = (wd === 0) ? 6 : wd - 1; // riallineo a settimana Lun=0..Dom=6
  return `${GIORNI_LUNGHI[wd]} ${d.getDate()} ${MESI[d.getMonth()].toLowerCase()}`;
}

/* Sezione "Richieste in corso" in home. Se esistono richieste reali delle
   strutture (in attesa di risposta) vengono mostrate quelle, ordinate per
   data piu' vicina; altrimenti si mostra un esempio statico (Casa Duna),
   cosi' la sezione non appare mai vuota mentre il database e' ancora senza
   dati veri. La riga di disponibilita' delle collaboratrici (Sara F.) e'
   invece SEMPRE un ESEMPIO STATICO illustrativo: non esiste ancora una
   funzionalita' che permetta alle collaboratrici di indicare le proprie
   date/orari liberi - quando la costruiremo, andra' sostituita con dati
   reali come gia' avviene per le richieste delle strutture. */
function buildLandingFeedHTML(){
  const richiesteStrutture = Object.values(db.richieste)
    .filter(r => r.stato === "nuova")
    .map(r => ({ r, s: db.strutture[r.strutturaId], dataFmt: formatDataItaliana(r.data) }))
    .filter(x => x.s && x.dataFmt)
    .map(x => ({ testo: `<strong>${x.s.nome}</strong> cerca collaboratrice per ${x.dataFmt}`, tipo: "struttura", data: x.r.data }));

  const esempioStruttura = { testo: "<strong>Casa Duna</strong> cerca collaboratrice per sabato 18 luglio", tipo: "struttura", data: "2026-07-18" };
  const esempiDisponibilitaCollab = [
    { testo: "<strong>Sara F.</strong> è disponibile per mercoledì 15 luglio dalle 8-13 e venerdì 17 dalle 8-13", tipo: "collab", data: "2026-07-15" },
    { testo: "<strong>Lucia T.</strong> è disponibile per giovedì 16 luglio dalle 8 alle 12", tipo: "collab", data: "2026-07-16" },
    { testo: "<strong>Franca B.</strong> è disponibile lunedì 3 agosto dalle 8.30 alle 12.30", tipo: "collab", data: "2026-08-03" }
  ];

  const voci = [...(richiesteStrutture.length ? richiesteStrutture : [esempioStruttura]), ...esempiDisponibilitaCollab]
    .sort((a,b) => (a.data < b.data ? -1 : 1));

  return `
    <div class="section-title" style="margin-top:0;">Richieste in corso</div>
    <div class="landing-feed">
      ${voci.map(v => `<div class="landing-feed-item${v.tipo === "collab" ? " collab" : ""}">${v.testo}</div>`).join("")}
    </div>
  `;
}

/* ---------- storage layer: Firebase Realtime Database ---------- */
/* Sostituisci questi valori con quelli del tuo progetto Firebase
   (Console Firebase → Impostazioni progetto → Le tue app → Configurazione SDK).
   Finché restano quelli di esempio, l'app funziona in locale con localStorage,
   utile per provare prima di collegare un vero progetto Firebase. */
const firebaseConfig = {
  apiKey: "AIzaSyBrSjHCZ9bbq1u3dwII_KoDs9Evs-GqfWU",
  authDomain: "a-postu.firebaseapp.com",
  databaseURL: "https://a-postu-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "a-postu",
  storageBucket: "a-postu.firebasestorage.app",
  messagingSenderId: "1025486134971",
  appId: "1:1025486134971:web:416bdcf9ebc43920c8139e"
};

/* Protezione minima per l'area di verifica iscrizioni: blocca chi visita il
   sito per caso, ma essendo solo lato client (visibile nel codice sorgente
   della pagina) NON impedisce a una persona esperta di scrivere direttamente
   nel database. Per una protezione solida serve un vero account admin
   collegato a Firebase Authentication + regole dedicate. */
const ADMIN_PASSWORD = "postu2026";

const DB_KEY = "apostu_db_v1";
const FIREBASE_ENABLED = firebaseConfig.apiKey !== "YOUR_API_KEY" && !firebaseConfig.databaseURL.startsWith("TODO_");
let fbRef = null;

function emptyDB(){ return { strutture:{}, collaboratrici:{}, richieste:{} }; }

/* Firebase Realtime Database non salva le chiavi con oggetto vuoto {} (es. prima
   che ci sia una collaboratrice registrata): quando i dati tornano dal server,
   quelle chiavi possono mancare del tutto. Questa funzione le ricostruisce
   sempre, cosi' il resto del codice puo' contare su strutture/collaboratrici/
   richieste sempre presenti. */
function normalizeDB(raw){
  if(!raw) return emptyDB();
  return {
    strutture: raw.strutture || {},
    collaboratrici: raw.collaboratrici || {},
    richieste: raw.richieste || {}
  };
}

function showError(msg){
  let banner = document.getElementById("global-error-banner");
  if(!banner){
    banner = document.createElement("div");
    banner.id = "global-error-banner";
    banner.style.cssText = "position:fixed; top:0; left:0; right:0; z-index:9999; background:#a32d2d; color:#fff; padding:10px 16px; font-size:13px; text-align:center;";
    document.body.prepend(banner);
  }
  banner.textContent = "Errore: " + msg + " (ricarica la pagina e riprova)";
}

function loadDB(){
  try{
    const raw = localStorage.getItem(DB_KEY);
    if(raw) return normalizeDB(JSON.parse(raw));
    return emptyDB();
  } catch(err){
    console.error("Errore lettura dati salvati:", err);
    showError("impossibile leggere i dati salvati sul browser (" + err.message + ")");
    return emptyDB();
  }
}
function saveDB(dbToSave){
  try{
    localStorage.setItem(DB_KEY, JSON.stringify(dbToSave));
  } catch(err){
    console.error("Errore salvataggio dati:", err);
    showError("impossibile salvare i dati sul browser (" + err.message + ")");
    throw err;
  }
}

let db = loadDB();

function persist(){
  try{
    saveDB(db);
  } catch(err){
    return; // errore gia' mostrato da saveDB, non proseguire con Firebase
  }
  if(FIREBASE_ENABLED && fbRef){
    fbRef.set(db).catch(err => {
      console.error("Errore salvataggio Firebase:", err);
      showError("impossibile salvare su Firebase (" + err.message + ")");
    });
  }
}

function initFirebase(){
  if(!FIREBASE_ENABLED){
    console.log("Firebase non configurato: uso localStorage. Modifica firebaseConfig per collegare un vero progetto.");
    return;
  }
  firebase.initializeApp(firebaseConfig);
  /* Autenticazione anonima: richiesta dalle regole di sicurezza del database
     (.read/.write: "auth != null"). Ogni visitatore ottiene una sessione
     automatica, senza bisogno di login - serve solo ad alzare la soglia
     rispetto a un accesso completamente libero (es. via comando diretto). */
  firebase.auth().signInAnonymously().catch(err => {
    console.error("Errore autenticazione anonima Firebase:", err);
    showError("impossibile autenticarsi con Firebase (" + err.message + ")");
  });
  firebase.auth().onAuthStateChanged(user => {
    if(!user || fbRef) return; // aspetto l'autenticazione, evito doppio listener
    fbRef = firebase.database().ref("apostu/data");
    fbRef.on("value", (snapshot) => {
      db = normalizeDB(snapshot.val());
      saveDB(db); // cache locale come fallback offline
      render();
    });
  });
}
function uid(prefix){ return prefix + "_" + Math.random().toString(36).slice(2,9); }

/* ---------- session ---------- */
let session = null; // { role: 'struttura'|'collaboratrice', id }

/* ---------- helpers ---------- */
function initials(name){
  return name.trim().split(/\s+/).map(w=>w[0]).join("").slice(0,2).toUpperCase();
}
function calcOre(mq, stanze){
  let h = (mq/22.5)*0.6 + stanze*0.4;
  h = Math.round(h*2)/2;
  if(h < 2) h = 2;
  return h;
}
function fmtEuro(n){ return Math.round(n) + " €"; }
function starsHTML(n, editable, onPick){
  const wrap = document.createElement("div");
  wrap.className = "stars";
  for(let i=1;i<=5;i++){
    const b = document.createElement(editable ? "button" : "span");
    b.textContent = i <= Math.round(n) ? "★" : "☆";
    b.style.color = i <= Math.round(n) ? "var(--sand)" : "var(--ink-soft)";
    if(editable){
      b.type = "button";
      b.onclick = () => onPick(i);
    }
    wrap.appendChild(b);
  }
  return wrap;
}
function ratingOf(c){
  if(!c.ratingCount) return null;
  return c.ratingSum / c.ratingCount;
}

/* ---------- root render ---------- */
const app = document.getElementById("app");
function render(){
  app.innerHTML = "";
  if(!session){ renderLanding(); return; }
  if(session.role === "admin"){ renderAdmin(); return; }
  if(session.role === "struttura"){ renderStrutturaShell(); return; }
  if(session.role === "collaboratrice"){ renderCollabShell(); return; }
}

/* ============================================================
   LANDING
   ============================================================ */
function renderLanding(){
  app.innerHTML = "";
  const wrap = document.createElement("div");
  wrap.className = "landing";
  wrap.innerHTML = `
    <div class="landing-card">
      <h1>A Postu</h1>
      <p class="motto">Semu a Postu</p>
      <p class="tagline">Uniamo le esigenze delle strutture turistiche con le esigenze delle collaboratrici.</p>
      ${buildMiniCalendarHTML()}
      <button class="role-btn primary" id="go-struttura">
        Sono una struttura
        <span class="sub">Cerchiamo collaboratrici in queste date · Accedi o registrati</span>
      </button>
      <button class="role-btn" id="go-collab">
        Sono una collaboratrice
        <span class="sub">Gestisci la tua disponibilità e le richieste · Accedi o registrati</span>
      </button>
      ${buildLandingFeedHTML()}
      <a href="#" class="link-admin" id="go-admin">Area verifica iscrizioni</a>
    </div>
  `;
  app.appendChild(wrap);
  document.getElementById("go-struttura").onclick = () => renderIntro("struttura");
  document.getElementById("go-collab").onclick = () => renderIntro("collaboratrice");
  document.getElementById("go-admin").onclick = (e) => { e.preventDefault(); renderAdminLogin(); };
}

/* ============================================================
   ACCESSO AREA VERIFICA ISCRIZIONI (protezione minima via password)
   ============================================================ */
function renderAdminLogin(){
  app.innerHTML = "";
  const wrap = document.createElement("div");
  wrap.className = "container";
  wrap.style.maxWidth = "420px";
  wrap.style.paddingTop = "60px";
  wrap.innerHTML = `
    <button id="back" class="small" style="margin-bottom:16px;">← Indietro</button>
    <div class="card">
      <h3 style="margin-bottom:12px;">Area verifica iscrizioni</h3>
      <div class="field">
        <label class="field-label">Password</label>
        <input type="password" id="admin-password" placeholder="••••••••" />
      </div>
      <div id="admin-login-error" class="muted small" style="color: var(--danger); margin-bottom:10px; display:none;">Password errata.</div>
      <button class="primary" id="admin-login-submit" style="width:100%;">Entra</button>
    </div>
  `;
  app.appendChild(wrap);
  document.getElementById("back").onclick = () => { session = null; render(); };
  const submit = () => {
    const value = document.getElementById("admin-password").value;
    if(value === ADMIN_PASSWORD){
      session = { role: "admin" };
      render();
    } else {
      document.getElementById("admin-login-error").style.display = "block";
    }
  };
  document.getElementById("admin-login-submit").onclick = submit;
  document.getElementById("admin-password").onkeydown = (e) => { if(e.key === "Enter") submit(); };
}

/* ============================================================
   PAGINA DESCRITTIVA (per ruolo, prima della registrazione)
   ============================================================ */
const INTRO_CONTENT = {
  struttura: {
    titolo: "Per le strutture ricettive",

function renderOpenRequestForm(wrap, struttura){
  const toggleBtn = wrap.querySelector("#toggle-open-request");
  const formWrap = wrap.querySelector("#open-request-form");
  toggleBtn.onclick = () => {
    const isOpen = !formWrap.classList.contains("hidden");
    if(isOpen){ formWrap.classList.add("hidden"); return; }
    formWrap.classList.remove("hidden");
    formWrap.innerHTML = `
      <div class="field"><label class="field-label">Data</label><input type="date" id="open-f-date" /></div>
      <div class="field"><label class="field-label">Fascia</label>
        <select id="open-f-fascia">${FASCE.map(f=>`<option>${f}</option>`).join("")}</select>
      </div>
      <div class="field"><label class="field-label">Tipo pulizia</label>
        <select id="open-f-tipo">${Object.keys(TARIFFE).map(t=>`<option value="${t}">${TARIFFE_LABEL[t]}</option>`).join("")}</select>
      </div>
      <button class="primary small" id="open-f-send" style="width:100%;">Pubblica richiesta</button>
    `;
    formWrap.querySelector("#open-f-send").onclick = () => {
      const date = formWrap.querySelector("#open-f-date").value;
      const fascia = formWrap.querySelector("#open-f-fascia").value;
      const tipo = formWrap.querySelector("#open-f-tipo").value;
      const ore = calcOre(struttura.mq, struttura.stanze);
      const rid = uid("r");
      db.richieste[rid] = {
        id: rid, strutturaId: struttura.id, collabId: null,
        data: date || "da definire", fascia, tipo,
        ore, guadagno: ore * TARIFFE[tipo],
        stato: "nuova",
        recensioneStruttura: null, recensioneCollab: null
      };
      persist();
      renderStrutturaShell();
    };
  };
}

        const rid = uid("r");
        db.richieste[rid] = {
          id: rid, strutturaId: struttura.id, collabId: id,
          data: date || "da definire", fascia, tipo,
          ore, guadagno: ore * TARIFFE[tipo],
          stato: "nuova",
          recensioneStruttura: null, recensioneCollab: null
        };
        persist();
        renderStrutturaShell();
      };
    };
  });
}

function renderRichiesteForStruttura(container, struttura){
  const list = Object.values(db.richieste).filter(r => r.strutturaId === struttura.id)
    .sort((a,b) => (a.data > b.data ? -1 : 1));
  if(!list.length){ container.innerHTML = `<p class="muted small">Nessuna richiesta ancora. Contatta una collaboratrice qui sopra.</p>`; return; }
  container.innerHTML = "";
  list.forEach(r => {
    const c = db.collaboratrici[r.collabId];
    const card = document.createElement("div");
    card.className = "card";
    const statoBadge = r.stato === "nuova" && !r.collabId
      ? `<span class="badge warn">aperta a tutte</span>`
      : {
          nuova: `<span class="badge warn">in attesa di risposta</span>`,
          rifiutata: `<span class="badge wait">rifiutata</span>`,
          accettata: `<span class="badge ok">accettata</span>`,
          confermata: `<span class="badge ok">confermata da te</span>`,
          completata: `<span class="badge ok">completata</span>`
        }[r.stato] || "";
    const nomeCollab = r.collabId ? (c ? c.nome : "—") : "Aperta a tutte le collaboratrici";
    card.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
        <div style="font-weight:600; font-size:14px;">${nomeCollab} · ${r.data} · ${r.fascia}</div>
        ${statoBadge}
      </div>
      <div class="muted small">${TARIFFE_LABEL[r.tipo]} · ${r.ore} ore · ${fmtEuro(r.guadagno)}</div>
      <div id="actions-${r.id}" style="margin-top:10px;"></div>
    `;
    container.appendChild(card);
    const actions = card.querySelector(`#actions-${r.id}`);
    if(r.stato === "accettata"){
      const btn = document.createElement("button");
      btn.className = "primary small";
      btn.textContent = "Conferma lavoro svolto";
      btn.onclick = () => { r.stato = "confermata"; persist(); renderStrutturaShell(); };
      actions.appendChild(btn);
    } else if(r.stato === "confermata" && !r.recensioneStruttura){
      const box = document.createElement("div");
      let chosen = 0;
      const starWrap = starsHTML(0, true, (n) => { chosen = n; starWrap.replaceWith(starsHTML(n, true, (m)=>{chosen=m;})); });
      box.appendChild(starWrap);
      const sendBtn = document.createElement("button");
      sendBtn.className = "small";
      sendBtn.style.marginTop = "8px";
      sendBtn.textContent = "Invia recensione";
      sendBtn.onclick = () => {
        if(chosen === 0) return;
        r.recensioneStruttura = chosen;
        if(r.recensioneCollab){
          const cc = db.collaboratrici[r.collabId];
          cc.ratingSum += r.recensioneCollab === null ? 0 : 0;
          r.stato = "completata";
          applyRatingIfBothDone(r);
        }
        persist();
        renderStrutturaShell();
      };
      box.appendChild(sendBtn);
      actions.appendChild(box);
    } else if(r.stato === "confermata" && r.recensioneStruttura){
      actions.innerHTML = `<p class="muted small">Recensione inviata. In attesa che ${c ? c.nome : "la collaboratrice"} recensisca voi.</p>`;
    } else if(r.stato === "completata"){
      actions.innerHTML = `<p class="muted small">Recensioni scambiate e pubblicate.</p>`;
    }

    if(r.stato === "nuova" || r.stato === "accettata"){
      const editRow = document.createElement("div");
      editRow.style.marginTop = "8px";
      const editBtn = document.createElement("button");
      editBtn.className = "small";
      editBtn.textContent = "Modifica data";
      const editForm = document.createElement("div");
      editForm.className = "hidden";
      editForm.style.marginTop = "8px";
      editBtn.onclick = () => {
        const isOpen = !editForm.classList.contains("hidden");
        if(isOpen){ editForm.classList.add("hidden"); return; }
        editForm.classList.remove("hidden");
        editForm.innerHTML = `
          <input type="date" value="${r.data !== 'da definire' ? r.data : ''}" id="edit-date-input-${r.id}" />
          <button class="primary small" id="edit-date-save-${r.id}" style="margin-top:6px; width:100%;">Salva nuova data</button>
        `;
        document.getElementById(`edit-date-save-${r.id}`).onclick = () => {
          const newDate = document.getElementById(`edit-date-input-${r.id}`).value;
          r.data = newDate || "da definire";
          persist();
          renderStrutturaShell();
        };
      };
      editRow.appendChild(editBtn);
      editRow.appendChild(editForm);
      actions.appendChild(editRow);
    }
  });
}

function applyRatingIfBothDone(r){
  // chiamato quando entrambe le recensioni sono presenti: aggiorna il rating della collaboratrice
  const c = db.collaboratrici[r.collabId];
  if(!c) return;
  if(r._ratingApplied) return;
  c.ratingSum += r.recensioneStruttura || 0;
  c.ratingCount += 1;
  r._ratingApplied = true;
}

/* ============================================================
   DASHBOARD COLLABORATRICE
   ============================================================ */
function renderCollabShell(){
  app.innerHTML = "";
  const c = db.collaboratrici[session.id];
  if(!c){ session = null; render(); return; }
  app.appendChild(topbar());
  const wrap = document.createElement("div");
  wrap.className = "container";
  app.appendChild(wrap);

  const mieRichieste = Object.values(db.richieste).filter(r => r.collabId === c.id);
  const inAttesa = mieRichieste.filter(r => r.stato === "nuova");
  const rating = ratingOf(c);

  wrap.innerHTML = `
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
      <div style="display:flex; align-items:center; gap:10px;">
        <div class="avatar">${initials(c.nome)}</div>
        <div>
          <h2 style="font-size:18px;">${c.nome}</h2>
          <p class="muted small">${c.zone.join(", ") || "zona non indicata"}</p>
        </div>
      </div>
      <span class="badge ${c.stato === "verificata" ? "ok" : "wait"}">${c.stato === "verificata" ? "✓ verificata" : "in verifica"}</span>
    </div>

    <div class="grid3">
      <div class="kpi"><div class="n">${rating ? rating.toFixed(1) : "—"}</div><div class="l">valutazione</div></div>
      <div class="kpi"><div class="n">${c.ratingCount}</div><div class="l">pulizie svolte</div></div>
      <div class="kpi"><div class="n">${inAttesa.length}</div><div class="l">richieste in attesa</div></div>
    </div>

    <div class="section-title">Richieste in attesa</div>
    <div class="stack" id="pending-req"></div>

    <div class="section-title">Richieste aperte</div>
    <div class="stack" id="open-req"></div>

    <div class="section-title">I tuoi impegni</div>
    <div class="stack" id="my-jobs"></div>

    <div class="section-title">Da recensire</div>
    <div class="stack" id="to-review"></div>
  `;

  renderPendingRequests(wrap.querySelector("#pending-req"), c);
  renderOpenRequests(wrap.querySelector("#open-req"), c);
  renderMyJobs(wrap.querySelector("#my-jobs"), c);
  renderToReview(wrap.querySelector("#to-review"), c);
}

function renderOpenRequests(container, collab){
  const list = Object.values(db.richieste).filter(r => r.stato === "nuova" && !r.collabId);
  if(!list.length){ container.innerHTML = `<p class="muted small">Nessuna richiesta aperta al momento.</p>`; return; }
  container.innerHTML = "";
  list.forEach(r => {
    const s = db.strutture[r.strutturaId];
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
        <div style="font-weight:600; font-size:14px;">${s ? s.nome : "—"} · ${r.data}, ${r.fascia}</div>
        <span class="badge warn">aperta</span>
      </div>
      <div class="muted small">${s ? s.zona : ""}</div>
      <div class="muted small">${s ? s.tipo : ""} · ${s ? s.mq : ""} mq · ${s ? s.stanze : ""} stanze${s && s.esterni.length ? " · " + s.esterni.join(", ") : ""}</div>
      <div class="req-summary">
        <span>tempo stimato</span><span class="val">${r.ore} ore</span>
      </div>
      <div class="req-summary">
        <span>guadagno potenziale</span><span class="val">${fmtEuro(r.guadagno)}</span>
      </div>
      <button data-claim="${r.id}" class="primary small" style="width:100%;">Accetta</button>
    `;
    container.appendChild(card);
  });
  container.querySelectorAll("[data-claim]").forEach(btn => {
    btn.onclick = () => {
      const rid = btn.getAttribute("data-claim");
      const richiesta = db.richieste[rid];
      if(!richiesta || richiesta.collabId){
        showError("questa richiesta è già stata presa da un'altra collaboratrice");
        renderCollabShell();
        return;
      }
      richiesta.collabId = collab.id;
      richiesta.stato = "accettata";
      persist();
      renderCollabShell();
    };
  });
}

function renderPendingRequests(container, collab){
  const list = Object.values(db.richieste).filter(r => r.collabId === collab.id && r.stato === "nuova");
  if(!list.length){ container.innerHTML = `<p class="muted small">Nessuna richiesta in attesa.</p>`; return; }
  container.innerHTML = "";
  list.forEach(r => {
    const s = db.strutture[r.strutturaId];
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
        <div style="font-weight:600; font-size:14px;">${s ? s.nome : "—"} · ${r.data}, ${r.fascia}</div>
        <span class="badge warn">nuova</span>
      </div>
      <div class="muted small">📍 ${s ? s.zona : ""}</div>
      <div class="muted small">${s ? s.tipo : ""} · ${s ? s.mq : ""} mq · ${s ? s.stanze : ""} stanze${s && s.esterni.length ? " · " + s.esterni.join(", ") : ""}</div>
      <div class="req-summary">
        <span>⏱ tempo stimato</span><span class="val">${r.ore} ore</span>
      </div>
      <div class="req-summary">
        <span>guadagno potenziale</span><span class="val">${fmtEuro(r.guadagno)}</span>
      </div>
      <div class="row">
        <button data-accept="${r.id}" class="primary small">Accetta</button>
        <button data-decline="${r.id}" class="small">Rifiuta</button>
      </div>
    `;
    container.appendChild(card);
  });
  container.querySelectorAll("[data-accept]").forEach(btn => {
    btn.onclick = () => { db.richieste[btn.getAttribute("data-accept")].stato = "accettata"; persist(); renderCollabShell(); };
  });
  container.querySelectorAll("[data-decline]").forEach(btn => {
    btn.onclick = () => { db.richieste[btn.getAttribute("data-decline")].stato = "rifiutata"; persist(); renderCollabShell(); };
  });
}

function renderMyJobs(container, collab){
  const list = Object.values(db.richieste).filter(r => r.collabId === collab.id && (r.stato === "accettata" || r.stato === "confermata"));
  if(!list.length){ container.innerHTML = `<p class="muted small">Nessun impegno confermato.</p>`; return; }
  container.innerHTML = "";
  list.forEach(r => {
    const s = db.strutture[r.strutturaId];
    const row = document.createElement("div");
    row.className = "card";
    row.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <div style="font-weight:600; font-size:14px;">${r.data} · ${r.fascia}</div>
          <div class="muted small">${s ? s.nome : "—"} · ${s ? s.zona : ""} · ${TARIFFE_LABEL[r.tipo]}</div>
        </div>
        <span class="badge ${r.stato === "confermata" ? "ok" : "wait"}">${r.stato === "confermata" ? "confermato" : "in attesa conferma"}</span>
      </div>
    `;
    container.appendChild(row);
  });
}

function renderToReview(container, collab){
  const list = Object.values(db.richieste).filter(r => r.collabId === collab.id && r.stato === "confermata" && !r.recensioneCollab);
  const done = Object.values(db.richieste).filter(r => r.collabId === collab.id && r.stato === "completata");
  if(!list.length && !done.length){ container.innerHTML = `<p class="muted small">Nessuna recensione da lasciare al momento.</p>`; return; }
  container.innerHTML = "";
  list.forEach(r => {
    const s = db.strutture[r.strutturaId];
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<div style="font-weight:600; font-size:14px; margin-bottom:8px;">${s ? s.nome : "—"} · ${r.data}</div>`;
    let chosen = 0;
    const starWrap = starsHTML(0, true, (n)=>{ chosen=n; starWrap.replaceWith(starsHTML(n,true,(m)=>{chosen=m;})); });
    card.appendChild(starWrap);
    const sendBtn = document.createElement("button");
    sendBtn.className = "small";
    sendBtn.style.marginTop = "8px";
    sendBtn.textContent = "Invia recensione";
    sendBtn.onclick = () => {
      if(chosen === 0) return;
      r.recensioneCollab = chosen;
      if(r.recensioneStruttura){
        r.stato = "completata";
        applyRatingIfBothDone(r);
      }
      persist();
      renderCollabShell();
    };
    card.appendChild(sendBtn);
    container.appendChild(card);
  });
  done.forEach(r => {
    const s = db.strutture[r.strutturaId];
    const row = document.createElement("div");
    row.className = "card";
    row.innerHTML = `<div class="muted small">${s ? s.nome : "—"} · ${r.data} · recensioni scambiate e pubblicate.</div>`;
    container.appendChild(row);
  });
}

/* ---------- avvio ---------- */
initFirebase();
render();
</script>
</body>
</html>
